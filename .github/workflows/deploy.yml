name: Deploy

on:
  push:
    branches: [main]

# Only one deployment at a time — queues rather than cancels
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  smoke-pre:
    name: Pre-deploy smoke check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install UV
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --frozen

      - name: Smoke tests (must pass before deploy)
        run: uv run pytest -m smoke -q

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: smoke-pre
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Digital Ocean VPS
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key:      ${{ secrets.DO_SSH_KEY }}
          script: |
            set -e

            cd /app

            echo "── Pulling latest code ──"
            git fetch origin
            git reset --hard origin/main

            echo "── Syncing dependencies ──"
            uv sync --frozen --no-dev

            echo "── Restarting service ──"
            sudo systemctl restart cp-factory

            echo "── Waiting for startup ──"
            sleep 3

            echo "── Health check ──"
            curl --fail --silent http://localhost:8395/health | python3 -c "
            import sys, json
            body = json.load(sys.stdin)
            assert body['status'] == 'ok', f'Health check failed: {body}'
            print('Health check passed:', body)
            "

            echo "── Deployed successfully ──"

  smoke-post:
    name: Post-deploy smoke check
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - uses: actions/checkout@v4

      - name: Install UV
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --frozen

      - name: Smoke tests against production
        env:
          BASE_URL: ${{ secrets.PRODUCTION_URL }}
        run: uv run pytest -m smoke -q
        continue-on-error: true
